services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moodle52-web
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./moodle-src/config.php:/var/www/html/config.php
      - ./moodle-src/public/mod/hvp:/var/www/html/public/mod/hvp
      - ./moodle-src/public/question/format/h5p:/var/www/html/public/question/format/h5p
      - ./moodle-src/public/course/format/remuiformat:/var/www/html/public/course/format/remuiformat
      - ./moodle-src/public/theme/moove:/var/www/html/public/theme/moove
      - ./moodle-src/public/local/hvactools:/var/www/html/public/local/hvactools
      - ./moodledata:/var/www/moodledata
    environment:
      TZ: America/Bogota
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: moodle52-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-file-per-table=1
    environment:
      MYSQL_ROOT_PASSWORD: root_moodle52
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle52
      TZ: America/Bogota
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
