services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moodle52-web
    depends_on:
      - mysql
    ports:
      - "8080:80"
    volumes:
      - ./moodledata:/var/www/moodledata
    environment:
      TZ: America/Bogota
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: moodle52-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-file-per-table=1
    environment:
      MYSQL_ROOT_PASSWORD: root_moodle52
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle52
      TZ: America/Bogota
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
